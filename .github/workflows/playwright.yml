name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # --- TADY ZAČÍNAJÍ NOTIFIKACE ---
    - name: Slack Notification
      if: always() # Spustí se vždy, barvu a text určíme dynamicky
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_TITLE: 'Test Report: Project TEST AUTOMATION'
        SLACK_USERNAME: 'Playwright-Bot'
        SLACK_ICON: https://playwright.dev/img/playwright-logo.svg
        # Dynamická barva podle výsledku
        SLACK_COLOR: ${{ job.status == 'success' && '#32a852' || '#ff0000' }}
        SLACK_MESSAGE: |
          *Status:* ${{ job.status == 'success' && '✅ PASSED' || '❌ FAILED' }}
          *Author:* ${{ github.actor }}
          *Branch:* `${{ github.ref_name }}`
          *Commit:* ${{ github.event.head_commit.message }}
          *Workflow:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Zobrazit detaily v GitHubu>
        SLACK_FOOTER: 'Playwright Automated Testing'