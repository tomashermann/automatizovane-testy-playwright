name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Důležité pro nahrávání na GitHub Pages
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test
      continue-on-error: true # Aby workflow pokračoval i při pádu testů a vygeneroval report

    # 1. KROK: Stažení historie z gh-pages (aby fungovaly grafy trendů)
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir

    # 2. KROK: Vygenerování samotného Allure Reportu
    - name: Allure Report action
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    # 3. KROK: Publikace na GitHub Pages
    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history
        publish_branch: gh-pages

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # 4. KROK: Vylepšená Slack Notifikace
    - name: Slack Notification
      if: always()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_TITLE: 'Test Report: Project TEST AUTOMATION'
        SLACK_USERNAME: 'Playwright-Bot'
        SLACK_ICON: https://playwright.dev/img/playwright-logo.svg
        SLACK_COLOR: ${{ job.status == 'success' && '#32a852' || '#ff0000' }}
        SLACK_MESSAGE: |
          *Status:* ${{ job.status == 'success' && '✅ PASSED' || '❌ FAILED' }}
          *Report:* https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          *Author:* ${{ github.actor }}
          *Branch:* `${{ github.ref_name }}`
          *Workflow:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Zobrazit detaily v GitHubu>
        SLACK_FOOTER: 'Playwright Automated Testing'