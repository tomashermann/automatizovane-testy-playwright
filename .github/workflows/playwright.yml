name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      id: playwright-tests
      # PŘIDÁNO: Smazání starých výsledků před testem, aby report nelhal
      run: |
        rm -rf allure-results
        npx playwright test
      continue-on-error: true # Vráceno sem, aby job neskončil dřív, než se nahraje report

    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir

    - name: Allure Report action
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history
        publish_branch: gh-pages

    # Tato část zajistí, že GitHub označí run jako FAILED, pokud testy neprošly
    - name: Check test status
      if: steps.playwright-tests.outcome == 'failure'
      run: |
        echo "Tests failed, marking job as failed."
        exit 1

    - name: Slack Notification
      if: always()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_TITLE: 'Test Report: Project TEST AUTOMATION'
        SLACK_USERNAME: 'Playwright-Bot'
        SLACK_ICON: https://playwright.dev/img/playwright-logo.svg
        SLACK_COLOR: ${{ steps.playwright-tests.outcome == 'success' && '#32a852' || '#ff0000' }}
        SLACK_MESSAGE: |
          *Status:* ${{ steps.playwright-tests.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }}
          *Report:* https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          *Author:* ${{ github.actor }}
          *Workflow:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Zobrazit detaily v GitHubu>
        SLACK_FOOTER: 'Playwright Automated Testing'